version: '3.8'

services:
  # ==================== 发送端 ====================
  sender:
    build: .
    container_name: netsec-sender
    environment:
      - MODE=sender
      - RECEIVER_HOST=${RECEIVER_HOST:-127.0.0.1}
      - RECEIVER_PORT=9999
      - LISTEN_PORT=9999
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - RSA_BITS=512
      - DATA_DIR=/app/captured_data
    network_mode: host
    volumes:
      - sender_data:/app/captured_data
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  # ==================== 接收端 ====================
  receiver:
    build: .
    container_name: netsec-receiver
    environment:
      - MODE=receiver
      - LISTEN_PORT=9999
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5001        # 接收端 Web 界面用 5001，避免与发送端 5000 冲突
      - RSA_BITS=512
      - DATA_DIR=/app/captured_data
    network_mode: host
    volumes:
      - receiver_data:/app/captured_data
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

volumes:
  sender_data:
  receiver_data:
