name: 构建并推送镜像到阿里云ACR

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]

env:
  IMAGE_NAME: grcs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # ========== 调试：验证 Secrets 是否存在 ==========
      - name: 调试 Secrets
        run: |
          echo "=== Secrets 调试信息 ==="
          echo "ALIYUN_REGISTRY: '${{ secrets.ALIYUN_REGISTRY }}'"
          echo "ALIYUN_USERNAME: '${{ secrets.ALIYUN_USERNAME }}'"
          echo "ALIYUN_NAMESPACE: '${{ secrets.ALIYUN_NAMESPACE }}'"
          echo -n "ALIYUN_PASSWORD length: "
          echo -n "${{ secrets.ALIYUN_PASSWORD }}" | wc -c
          echo ""
          echo "=== 验证 registry 可达性 ==="
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" "https://${{ secrets.ALIYUN_REGISTRY }}/v2/" || echo "无法连接到 registry"
          echo ""
          echo "=== 尝试直接 docker login ==="
          echo "${{ secrets.ALIYUN_PASSWORD }}" | docker login "${{ secrets.ALIYUN_REGISTRY }}" -u "${{ secrets.ALIYUN_USERNAME }}" --password-stdin 2>&1 || true

      - name: 登录阿里云ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALIYUN_REGISTRY }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.ALIYUN_REGISTRY }}/${{ secrets.ALIYUN_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=sha,prefix=

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
