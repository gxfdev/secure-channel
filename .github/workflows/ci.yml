name: CI - 算法测试与集成

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 测试 SHA-256
        run: |
          python -c "
          from sha256 import sha256
          # NIST 测试向量
          assert sha256(b'abc').hex() == 'ba7816bf8f01cfea414140de5dae2223b00361a396177a9cb410ff61f20015ad', 'SHA-256 FAIL'
          print('SHA-256: PASS')
          "

      - name: 测试 HMAC-SHA256
        run: |
          python -c "
          from hmac_sha256 import hmac_sha256
          # RFC 4231 测试向量
          result = hmac_sha256(b'Jefe', b'what do ya want for nothing?').hex()
          assert result == '5bdcc146bf60754e6a042426089575c75a003f089d2739839dec58b964ec3843', 'HMAC-SHA256 FAIL'
          print('HMAC-SHA256: PASS')
          "

      - name: 测试 AES-128-CBC
        run: |
          python -c "
          import os
          from aes import aes_encrypt, aes_decrypt
          key = os.urandom(16)
          iv = os.urandom(16)
          plaintext = b'Hello, AES-128-CBC encryption test!'
          ct, iv_used = aes_encrypt(plaintext, key, mode='cbc', iv=iv)
          pt = aes_decrypt(ct, key, mode='cbc', iv=iv_used)
          assert pt == plaintext, f'AES FAIL: got {pt}'
          print('AES-128-CBC: PASS')
          "

      - name: 测试 RSA + 数字签名
        run: |
          python -c "
          from rsa import generate_keypair, rsa_encrypt_bytes, rsa_decrypt_bytes, rsa_sign, rsa_verify
          pub, priv = generate_keypair(512)
          msg = b'RSA encryption and signature test'
          # 加密解密
          ct = rsa_encrypt_bytes(msg, pub)
          pt = rsa_decrypt_bytes(ct, priv)
          assert pt == msg, 'RSA encrypt/decrypt FAIL'
          # 签名验证
          sig = rsa_sign(msg, priv)
          assert rsa_verify(msg, sig, pub), 'RSA signature FAIL'
          # 篡改检测
          assert not rsa_verify(b'tampered', sig, pub), 'RSA tamper detection FAIL'
          print('RSA + Signature: PASS')
          "

      - name: 测试 DH 密钥协商
        run: |
          python -c "
          from dh import DHPeer
          alice = DHPeer(bits=256)
          bob = DHPeer(bits=256)
          alice.compute_shared_secret(bob.get_public_key())
          bob.compute_shared_secret(alice.get_public_key())
          assert alice.get_session_key() == bob.get_session_key(), 'DH session key mismatch'
          assert alice.get_hmac_key() == bob.get_hmac_key(), 'DH HMAC key mismatch'
          print('DH Key Exchange: PASS')
          "

      - name: 测试完整加密传输流程
        run: |
          python -c "
          import os
          from aes import aes_encrypt, aes_decrypt
          from hmac_sha256 import hmac_sha256
          from rsa import generate_keypair, rsa_sign, rsa_verify
          from dh import DHPeer

          # 1. DH 协商
          alice = DHPeer(bits=256)
          bob = DHPeer(bits=256)
          alice.compute_shared_secret(bob.get_public_key())
          bob.compute_shared_secret(alice.get_public_key())
          session_key = alice.get_session_key()
          hmac_key = alice.get_hmac_key()

          # 2. AES 加密
          data = b'Sensor data: temperature=25.3, humidity=60%'
          iv = os.urandom(16)
          ct, iv_used = aes_encrypt(data, session_key, mode='cbc', iv=iv)

          # 3. HMAC 认证
          mac = hmac_sha256(hmac_key, ct)
          # 接收端验证 HMAC
          assert hmac_sha256(hmac_key, ct) == mac, 'HMAC verification FAIL'

          # 4. RSA 签名（不可否认性）
          pub, priv = generate_keypair(512)
          sig = rsa_sign(ct, priv)
          assert rsa_verify(ct, sig, pub), 'RSA signature verification FAIL'

          # 5. 解密
          pt = aes_decrypt(ct, session_key, mode='cbc', iv=iv_used)
          assert pt == data, 'Decryption FAIL'

          print('Full Pipeline: PASS')
          "

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Docker 镜像
        run: docker build -t netsec-secure-channel:test .

      - name: 验证镜像
        run: |
          docker run --rm netsec-secure-channel:test python -c "
          from sha256 import sha256
          from aes import aes_encrypt, aes_decrypt
          from rsa import generate_keypair, rsa_sign, rsa_verify
          from dh import DHPeer
          from hmac_sha256 import hmac_sha256
          print('All modules importable: OK')
          "
